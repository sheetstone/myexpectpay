server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Firebase signInWithPopup requires same-origin-allow-popups so the auth
    # popup can call window.closed back to the opener without being blocked.
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    # BACKEND_URL is substituted at container start via envsubst (see Dockerfile CMD)
    # Local dev default: http://backend:3001
    # Railway production: set BACKEND_URL env var on the frontend service
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test
        env:
          # Firebase client (public — safe to hardcode for CI)
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-test
          NEXT_PUBLIC_FIREBASE_API_KEY: fake-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-test.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:0000000000000000
          # Firebase Admin — lazy init falls back to demo project when credentials absent
          FIREBASE_PROJECT_ID: demo-test
          # ACCOUNT_ENCRYPTION_KEY not needed — crypto tests set their own key in beforeEach

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-test
          NEXT_PUBLIC_FIREBASE_API_KEY: fake-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-test.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:0000000000000000
          FIREBASE_PROJECT_ID: demo-test

  deploy-firestore:
    name: Deploy Firestore rules and indexes
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules and indexes
        run: firebase deploy --only firestore:rules,firestore:indexes --project myexpertpay
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
